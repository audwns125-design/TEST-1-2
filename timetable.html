<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>2026 1회고사 · 2학년 고사실</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Noto Sans KR',sans-serif;background:#f0f4f8;color:#1a2744;min-height:100vh;font-size:14px}

/* ── 헤더 ── */
.hd{background:#0f172a;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.hd-logo{display:flex;align-items:center;gap:10px}
.hd-logo img{height:38px;width:auto}
.hd-t{font-size:14px;font-weight:900;letter-spacing:-.3px;line-height:1.3}
.hd-s{font-size:10px;opacity:.5;margin-top:2px}
.leg{display:flex;gap:6px;flex-shrink:0}
.ldi{display:flex;align-items:center;gap:3px;font-size:9px;color:rgba(255,255,255,.55)}
.ldi span{width:7px;height:7px;border-radius:2px;display:inline-block}

/* ── 반 탭 ── */
.cls-tabs{background:#1e293b;display:flex;overflow-x:auto;padding:0 8px;gap:2px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cls-tabs::-webkit-scrollbar{display:none}
.cls-tab{padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;background:transparent;
  border:none;border-bottom:3px solid transparent;color:rgba(255,255,255,.4);
  white-space:nowrap;font-family:'Noto Sans KR',sans-serif;transition:color .15s;flex-shrink:0}
.cls-tab.active{color:#fff;border-bottom-color:#60a5fa}

/* ── 기능 탭 ── */
.fn-tabs{background:#fff;border-bottom:2px solid #e2e8f0;display:flex}
.fn-tab{flex:1;padding:10px 8px;font-size:13px;font-weight:700;cursor:pointer;background:transparent;
  border:none;border-bottom:3px solid transparent;color:#94a3b8;margin-bottom:-2px;
  font-family:'Noto Sans KR',sans-serif;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:2px}
.fn-tab.active{color:#1e3a5f;border-bottom-color:#1e3a5f}

/* ── 콘텐츠 ── */
.content{padding:12px;max-width:680px;margin:0 auto}
.panel{background:#fff;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.panel-lbl{font-size:11px;font-weight:700;color:#64748b;margin-bottom:8px}

/* ── 학생 버튼 ── */
.stu-grid{display:flex;flex-wrap:wrap;gap:6px}
.sbtn{padding:7px 13px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;
  border:1.5px solid #e2e8f0;background:#fff;color:#64748b;transition:all .15s;
  font-family:'Noto Sans KR',sans-serif;-webkit-appearance:none}
.sbtn:active{transform:scale(.96)}
.sbtn.active{background:#0f172a;color:#fff;border-color:#0f172a}

/* ── 학생 카드 헤더 ── */
.scard{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.1);margin-bottom:4px}
.scard-hd{background:#0f172a;color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px}
.ava{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0}
.scard-hd h2{font-size:18px;font-weight:900}
.scard-hd p{font-size:11px;opacity:.55;margin-top:2px}

/* ── 날짜 섹션 ── */
.day-section{border-top:1px solid #e8edf5}
.day-section:first-child{border-top:none}
.day-header{background:#1e3a5f;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px}
.day-name{font-size:15px;font-weight:900}
.day-badge{font-size:10px;background:rgba(255,255,255,.18);padding:2px 8px;border-radius:10px;font-weight:600}

/* ── 교시 카드 (모바일 핵심) ── */
.period-cards{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.pcard{border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 2px 8px rgba(0,0,0,.1)}
/* 상단 타입 배지 */
.pcard-badge{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 9px}
.pcard-badge.exam {background:#1d4ed8}
.pcard-badge.study{background:#d97706}
.pcard-badge.all  {background:#15803d}
.pcard-type{font-size:17px;font-weight:900;color:#fff;letter-spacing:-.3px}
.pcard-period{font-size:11px;font-weight:700;color:rgba(255,255,255,.75);
  background:rgba(0,0,0,.18);padding:3px 10px;border-radius:20px}
/* 하단 내용 영역 */
.pcard-body{flex:1;padding:12px 16px 13px;display:flex;flex-direction:column;gap:5px}
.pcard-body.exam {background:#f0f6ff;border:2px solid #bfdbfe;border-top:none}
.pcard-body.study{background:#fffdf0;border:2px solid #fde68a;border-top:none}
.pcard-body.all  {background:#f0fdf4;border:2px solid #bbf7d0;border-top:none}
.pcard-subj{font-size:13px;font-weight:600;line-height:1.4}
.pcard-body.exam  .pcard-subj{color:#1e3a8a}
.pcard-body.study .pcard-subj{color:#78350f}
.pcard-body.all   .pcard-subj{color:#14532d}
.pcard-room{font-size:22px;font-weight:900;line-height:1.2}
.pcard-body.exam  .pcard-room{color:#1d4ed8}
.pcard-body.study .pcard-room{color:#b45309}
.pcard-body.all   .pcard-room{color:#15803d}
.pcard-code{font-size:10px;opacity:.55;margin-top:1px}
.pcard-body.exam  .pcard-code{color:#1e40af}
.pcard-body.study .pcard-code{color:#92400e}

/* ── 교시별 현황 ── */
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.pcol-lbl{font-size:10px;font-weight:700;color:#94a3b8;text-align:center;margin-bottom:4px}
.pbtn{display:block;width:100%;padding:8px 4px;border-radius:8px;cursor:pointer;
  font-size:11px;font-weight:700;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;
  line-height:1.4;text-align:center;font-family:'Noto Sans KR',sans-serif;-webkit-appearance:none}
.pbtn.active{background:#0f172a;color:#fff;border-color:#0f172a}
.pbtn .ps{font-weight:400;font-size:9px;opacity:.7;display:block;margin-top:1px}

.room-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.rcard{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.rcard-hd{padding:9px 12px}
.rcard-hd.exam {background:#dbeafe}.rcard-hd.study{background:#fef9c3}.rcard-hd.all{background:#dcfce7}
.rc-r{font-size:14px;font-weight:800}
.rcard-hd.exam .rc-r{color:#1e40af}.rcard-hd.study .rc-r{color:#b45309}.rcard-hd.all .rc-r{color:#15803d}
.rc-s{font-size:10px;opacity:.75;margin-top:1px}
.rcard-hd.exam .rc-s{color:#1d4ed8}.rcard-hd.study .rc-s{color:#92400e}.rcard-hd.all .rc-s{color:#166534}
.rcard-bd{padding:8px 12px}
.stu-cnt{font-size:10px;color:#94a3b8;margin-bottom:4px}
.stag{display:inline-block;padding:3px 8px;border-radius:5px;font-size:12px;font-weight:600;margin:2px}
.rcard-bd.exam  .stag{background:#dbeafe;color:#1d4ed8}
.rcard-bd.study .stag{background:#fef9c3;color:#92400e}
.rcard-bd.all   .stag{background:#dcfce7;color:#166534}

.empty{text-align:center;padding:48px 20px;color:#94a3b8;font-size:13px}
.empty-ico{font-size:36px;margin-bottom:10px}
.tc{display:none}.tc.active{display:block}

/* 반 탭 — 선택된 탭 강조 */
.cls-tab.active{color:#fff;border-bottom-color:#60a5fa;background:rgba(96,165,250,.08)}
/* 학생 버튼 — 더 둥글고 친근하게 */
.sbtn{border-radius:20px!important;padding:8px 14px!important;font-size:13px!important}
.sbtn.active{background:linear-gradient(135deg,#1e3a5f,#2563eb)!important;border-color:transparent!important}
/* 날짜 헤더 — 부드럽게 */
.day-header{border-radius:0;gap:8px;padding:10px 14px}
/* pcard — 살짝 더 둥글게 */
.pcard{margin-bottom:4px}
</style>
</head>

const normS=s=>(s||'').replace(/[\s·ⅠⅡ]/g,'');

function matchSubject(examRooms,periodSubj){
  const pn=normS(periodSubj);
  const isLang=/일본어|중국어/.test(periodSubj);
  const isSplit=/\//.test(periodSubj);
  for(const[subj,code]of Object.entries(examRooms)){
    const sn=normS(subj);
    if(sn===pn||sn.includes(pn)||pn.includes(sn))return[subj,code];
    if(isLang&&/일본어|중국어/.test(subj))return[subj,code];
    if(isSplit){for(const part of periodSubj.split('/')){if(sn.includes(normS(part))||normS(part).includes(sn))return[subj,code];}}
  }
  return null;
}

function getRealId(stu){
  return `${stu.grade}${String(stu.classNum).padStart(2,'0')}${String(stu.num).padStart(2,'0')}`;
}

function getSchedule(stu){
  const ownClass=`2학년 ${stu.classNum}반`;
  return PERIODS_2.map(p=>{
    const pk=`${p.date}_${p.period}`;
    if(p.isAll)return{type:'all',room:ownClass,subject:p.subject};
    const match=matchSubject(stu.examRooms,p.subject);
    if(match){
      const[subj,code]=match;
      return{type:'exam',room:code,roomName:ROOM_MAP_2[code]||code,subject:subj};
    }
    const rid=getRealId(stu);
    const studyRoom=(STUDY_MAP[rid]&&STUDY_MAP[rid][pk])||ownClass;
    return{type:'study',room:studyRoom,subject:p.subject};
  });
}

function selectCls(c){
  curCls=c;selStu=null;selPer=null;
  document.querySelectorAll('.cls-tab').forEach(b=>b.classList.remove('active'));
  $('ctab-'+c).classList.add('active');
  const stus=ALL_STUDENTS.filter(s=>s.classNum===c);
  $('slbl').textContent=`2-${c}반 학생 선택 (${stus.length}명)`;
  const sg=$('sgrid');sg.innerHTML='';
  stus.forEach(s=>{
    const b=document.createElement('button');b.className='sbtn';b.id='sb-'+s.num;
    b.textContent=`${s.num}. ${s.name}`;b.onclick=()=>selStudent(s.num);sg.appendChild(b);
  });
  $('sa').innerHTML='<div class="empty"><div class="empty-ico">👆</div>위에서 학생을 선택하세요</div>';
  $('pa').innerHTML='<div class="empty"><div class="empty-ico">📅</div>위에서 교시를 선택하세요</div>';
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('active'));
}

function selStudent(num){
  if(selStu!==null)$('sb-'+selStu)?.classList.remove('active');
  selStu=num;$('sb-'+num)?.classList.add('active');
  const stu=ALL_STUDENTS.find(s=>s.classNum===curCls&&s.num===num);
  const sched=getSchedule(stu);
  const days=[...new Set(PERIODS_2.map(p=>p.date))];
  const rid=getRealId(stu);
  // 날짜별 교시 목록 (날짜마다 교시 수가 다를 수 있음)

    </div>`;

  let _si=0;
  days.forEach((day,di)=>{
    const ko=DAYS_KO[day]||'';
    const dayPs=dayPsMap[day];
    html+=`<div class="day-section">
      <div class="day-header">
        <span class="day-name">${day}</span>
        <span class="day-badge">${ko}</span>
      </div>
      <div class="period-cards">`;
    for(let pi=0;pi<dayPs.length;pi++){
      const slot=sched[_si+pi];
      if(!slot)continue;
      const p=dayPs[pi];
      const cls=slot.type;
      let rd='',code='';
      if(slot.type==='exam'){
        rd=(slot.roomName||slot.room).replace('2학년 ','').replace('학년 ','');
        code=`<div class="pcard-code">분반코드 ${slot.room}</div>`;
      }else{
        rd=(slot.room||'').replace('2학년 ','').replace('학년 ','');
      }
      html+=`<div class="pcard">
        <div class="pcard-badge ${cls}">
          <span class="pcard-type">${TYPE_LABEL[cls]}</span>
          <span class="pcard-period">${p.period}</span>
        </div>
        <div class="pcard-body ${cls}">
          <div class="pcard-subj">${slot.subject}</div>
          <div class="pcard-room">${rd} 교실</div>
          ${code}
        </div>
      </div>`;
    }
    html+=`</div></div>`;
    _si+=dayPs.length;
  });

  html+=`</div>`;
  $('sa').innerHTML=html;
  // 스크롤
  $('sa').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function selPeriod(idx){
  if(selPer!==null)$('pb-'+selPer)?.classList.remove('active');
  selPer=idx;$('pb-'+idx)?.classList.add('active');
  const p=PERIODS_2[idx];
  const stus=ALL_STUDENTS.filter(s=>s.classNum===curCls);
  const groups={};
  stus.forEach(stu=>{
    const slot=getSchedule(stu)[idx];if(!slot)return;
    const rk=slot.roomName||slot.room;
    const key=slot.type+'::'+rk;
    if(!groups[key])groups[key]={slot,students:[]};
    groups[key].students.push(stu);
  });
  const ord={exam:0,all:1,study:2};
  const sorted=Object.values(groups).sort((a,b)=>
    ord[a.slot.type]-ord[b.slot.type]||
    (a.slot.roomName||a.slot.room).localeCompare(b.slot.roomName||b.slot.room));
  const L={exam:'📝 시험',study:'✏️ 자습',all:'👥 반전체'};
  let cards='';
  sorted.forEach(g=>{
    const cls=g.slot.type;
    const rd=(g.slot.roomName||g.slot.room).replace('2학년 ','').replace('학년 ','')+' 교실';
    const ci=g.slot.type==='exam'?` · ${g.slot.room}`:'';
    const tags=g.students.map(s=>`<span class="stag">${s.num}. ${s.name}</span>`).join('');
    cards+=`<div class="rcard"><div class="rcard-hd ${cls}"><div class="rc-r">${rd}</div><div class="rc-s">${L[cls]} · ${g.slot.subject}${ci}</div></div><div class="rcard-bd ${cls}"><div class="stu-cnt">${g.students.length}명</div>${tags}</div></div>`;
  });
  const ko=DAYS_KO[p.date]||'';
  $('pa').innerHTML=`<div style="font-size:14px;font-weight:800;color:#1a2744;margin-bottom:12px">${p.date} ${ko} ${p.period} <span style="color:#64748b;font-size:13px;font-weight:500">· ${p.subject}</span></div><div class="room-list">${cards}</div>`;
}

function swFn(name,btn){
  document.querySelectorAll('.fn-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.querySelectorAll('.tc').forEach(c=>c.classList.remove('active'));
  $('tc-'+name).classList.add('active');
}

selectCls(1);
</script>
